version: "3.8"

# Clara AI — n8n Self-Hosted Orchestrator
# Zero-cost local setup. Run: docker compose up -d

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: clara_ai_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # Security
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=clara_ai_2024
      # Data
      - N8N_USER_FOLDER=/home/node/.n8n
      - DB_TYPE=sqlite
      # Timezone
      - GENERIC_TIMEZONE=America/New_York
      - TZ=America/New_York
      # Disable telemetry
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      # Workflow settings
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=true
      - EXECUTIONS_DATA_MAX_AGE=336   # 14 days
      # Optional: GitHub issue creation (set your token here)
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_REPO=${GITHUB_REPO:-}
    volumes:
      - n8n_data:/home/node/.n8n
      # Mount the repo so n8n can read/write files
      - ${REPO_ROOT:-.}/..:/data/repo
    networks:
      - clara_net

volumes:
  n8n_data:
    driver: local

networks:
  clara_net:
    driver: bridge
